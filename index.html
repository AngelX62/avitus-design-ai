    <script>
      // Apply theme synchronously before paint to avoid flash.
      // "system" preference is time-based: 06:00–17:59 → light, else dark.
      (function () {
        try {
          var pref = localStorage.getItem("avitus-theme-preference");
          var resolved;
          if (pref === "light" || pref === "dark") {
            resolved = pref;
          } else {
            var hour = new Date().getHours();
            resolved = hour >= 6 && hour < 18 ? "light" : "dark";
          }
          if (resolved === "dark") {
            document.documentElement.classList.add("dark");
          }
          localStorage.setItem("theme", resolved);
        } catch (e) {}
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
